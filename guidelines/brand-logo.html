<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px; box-sizing: border-box; display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; background: #fff; }
  .tile { border-radius: 16px; display: flex; align-items: center; justify-content: center; gap: 16px; padding: 22px; }
</style>
</head>
<body>
  <div class="tile" style="background: var(--cream-50); border: 1px solid var(--border-soft);">
    <img src="../assets/logo-lockup-terra.png" alt="Simplaro Lockup Terra" style="height: 52px; width: auto;">
  </div>
  <div class="tile" style="background: var(--cream-50); border: 1px solid var(--border-soft);">
    <img src="../assets/logo-mark-terra.png" alt="Simplaro S-Mark Terra" style="height: 56px; width: auto;">
  </div>
  <div class="tile" style="background: var(--grad-terra-section);">
    <img src="../assets/logo-lockup-white.png" alt="Simplaro Lockup Weiss" style="height: 52px; width: auto;">
  </div>
  <div class="tile" style="background: var(--ink-950);">
    <img src="../assets/logo-mark-white.png" alt="Simplaro S-Mark Weiss" style="height: 56px; width: auto;">
  </div>
</body>
</html>
