<!-- @dsCard group="Colors" viewport="700x170" name="Creme & Sand" subtitle="Hintergründe und Kartenflächen — hell nach dunkel" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { display: flex; gap: 10px; padding: 16px; box-sizing: border-box; background: #fff; }
  .sw { flex: 1; height: 138px; border-radius: 14px; border: 1px solid var(--border-strong); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px 14px; box-sizing: border-box; }
  .n { font-size: 13px; font-weight: 700; color: var(--text-strong); }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="sw" style="background: var(--cream-card);"><span class="n">Karte</span><span class="v">#FFFDF8</span></div>
  <div class="sw" style="background: var(--cream-50);"><span class="n">Creme 50</span><span class="v">#FBF4EE</span></div>
  <div class="sw" style="background: var(--cream-100);"><span class="n">Seite</span><span class="v">#F4EDE1</span></div>
  <div class="sw" style="background: var(--sand-200);"><span class="n">Sand</span><span class="v">#EAE0CC</span></div>
  <div class="sw" style="background: var(--sand-300);"><span class="n">Sand-Hover</span><span class="v">#E2D5BC</span></div>
</body>
</html>
