</head>
<body>
  <div class="sw" style="background: var(--terra-700);"><span class="n">Terra tief</span><span class="v">#A83A08</span></div>

  <div class="sw" style="background: var(--orange-500);"><span class="n">CTA</span><span class="v">#E2652C</span></div>
