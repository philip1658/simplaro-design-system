<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px 28px; box-sizing: border-box; display: flex; align-items: center; gap: 14px; }
  .chip { background: var(--surface-card); border: 1px solid var(--border-strong); border-radius: 14px; padding: 14px 18px; display: flex; flex-direction: column; gap: 6px; }
  .meta { font-family: var(--font-sans); font-size: 10.5px; font-weight: 600; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="chip" style="background: var(--ink-950); border: none;">
    <span class="meta" style="color: rgba(255,255,255,0.5);">Timecode</span>
    <span style="font-family: var(--font-mono); font-size: 15px; font-weight: 500; letter-spacing: 0.16em; color: var(--cream-50);"><span style="color: var(--peach-200);">▶</span> BUERO-BOT.MP4&nbsp;&nbsp;00:07.3</span>
  </div>
  <div class="chip">
    <span class="meta">Zahlen</span>
    <span style="font-family: var(--font-mono); font-size: 17px; font-weight: 600; color: var(--text-strong);">CHF 4'800.– / 12 Std.</span>
  </div>
  <div class="chip">
    <span class="meta">Code-Detail</span>
    <span style="font-family: var(--font-mono); font-size: 14px; font-weight: 400; color: var(--terra-500);">hallo@simplaro.ch</span>
  </div>
</body>
</html>
