<!-- @dsCard group="Colors" viewport="700x190" name="Verläufe & Glow" subtitle="Terracotta-Sektionen mit Peach-Glow und ✦-Twinkle" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { display: flex; gap: 10px; padding: 16px; box-sizing: border-box; background: #fff; }
  .sw { flex: 1; height: 158px; border-radius: 14px; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px 14px; box-sizing: border-box; }
  .n { font-size: 13px; font-weight: 700; color: #FFF3E8; position: relative; }
  .v { font-family: var(--font-mono); font-size: 10.5px; color: rgba(255,243,232,0.75); position: relative; }
  .glow { position: absolute; inset: 0; background: var(--glow-peach); }
  .tw { position: absolute; color: #fff; font-size: 11px; animation: twinkle 5.5s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="sw" style="background: var(--grad-terra-section);">
    <div class="glow"></div><span class="tw" style="left: 14%; top: 22%;">✦</span><span class="tw" style="right: 12%; top: 48%; animation-delay: 2.4s; font-size: 9px;">✦</span>
    <span class="n">Sektion Terra</span><span class="v">180deg · #A83A08 → #CA5019</span>
  </div>
  <div class="sw" style="background: var(--grad-terra-finale);">
    <div class="glow"></div><span class="tw" style="left: 20%; top: 30%; animation-delay: 1s;">✦</span>
    <span class="n">Kontakt-Finale</span><span class="v">178deg · #A83A08 → #D75A20</span>
  </div>
  <div class="sw" style="background: var(--grad-package);">
    <span class="n">Paket-Karte</span><span class="v">170deg · #C05D29 → #A54A1B</span>
  </div>
</body>
</html>
