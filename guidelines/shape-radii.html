<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px 28px; box-sizing: border-box; display: flex; align-items: flex-end; gap: 14px; }
  .r { background: var(--sand-200); border: 1px solid var(--border-strong); display: flex; align-items: flex-end; padding: 10px 12px; box-sizing: border-box; }
  .l { display: flex; flex-direction: column; gap: 2px; }
  .n { font-size: 11.5px; font-weight: 700; color: var(--text-strong); }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="r" style="width: 130px; height: 120px; border-radius: var(--radius-xl);"><span class="l"><span class="n">Paket-Karte</span><span class="v">26px</span></span></div>
  <div class="r" style="width: 120px; height: 110px; border-radius: var(--radius-lg);"><span class="l"><span class="n">Karte</span><span class="v">22px</span></span></div>
  <div class="r" style="width: 110px; height: 96px; border-radius: var(--radius-md);"><span class="l"><span class="n">Bubble</span><span class="v">18px</span></span></div>
  <div class="r" style="width: 100px; height: 80px; border-radius: var(--radius-sm);"><span class="l"><span class="n">Tile</span><span class="v">14px</span></span></div>
  <div class="r" style="width: 56px; height: 56px; border-radius: var(--radius-xs); align-items: center; justify-content: center;"><span class="v">6px</span></div>
  <div class="r" style="width: 150px; height: 48px; border-radius: var(--radius-pill); background: var(--orange-500); border: none; align-items: center; justify-content: center;"><span class="n" style="color: #fff;">Pill · 999px</span></div>
</body>
</html>
