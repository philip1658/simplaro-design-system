<!-- @dsCard group="Brand" viewport="700x240" name="Büro-Bot in Bewegung" subtitle="Video-Loop fürs Web — muted, loop, playsinline, weich gerundet" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px; box-sizing: border-box; display: flex; gap: 14px; align-items: stretch; background: #fff; }
  video { flex: 1.4; min-width: 0; border-radius: 16px; display: block; object-fit: cover; }
  .note { flex: 1; background: var(--grad-terra-section); border-radius: 16px; padding: 16px 18px; box-sizing: border-box; display: flex; flex-direction: column; gap: 8px; justify-content: flex-end; }
  .n { font-size: 13.5px; font-weight: 700; color: var(--peach-100); }
  .v { font-family: var(--font-mono); font-size: 10.5px; line-height: 1.6; color: rgba(255,243,232,0.8); }
</style>
</head>
<body>
  <video id="vid" autoplay muted playsinline></video>
  <div class="note">
    <span class="n">assets/buerobot-dance.mp4</span>
    <span class="v">1080p · Einsatz: Sektions-Illustration, Hero-Alternative · immer muted + playsinline · spielt 1×, kein Loop · Radius 16–18px</span>
  </div>
  <script>
    /* Server liefert MP4 ohne Range-Support — komplett laden und als Blob füttern. */
    fetch('../assets/buerobot-dance.mp4')
      .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.blob(); })
      .then(function (b) {
        var v = document.getElementById('vid');
        v.src = URL.createObjectURL(b);
        v.play().catch(function () {});
      })
      .catch(function () {});
  </script>
</body>
</html>
