<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { display: flex; gap: 10px; padding: 16px; box-sizing: border-box; background: #fff; }
  .sw { flex: 1; height: 138px; border-radius: 14px; border: 1px solid var(--border-strong); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px 14px; box-sizing: border-box; }
  .n { font-size: 13px; font-weight: 700; color: var(--text-strong); }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .demo { flex: 1.6; background: var(--grad-terra-section); border: none; justify-content: center; gap: 10px; align-items: flex-start; }
</style>
</head>
<body>
  <div class="sw" style="background: var(--peach-100);"><span class="n">Peach 100</span><span class="v">#FFF3E8</span></div>
  <div class="sw" style="background: var(--peach-150);"><span class="n">Badge-Grund</span><span class="v">#F5E3D7</span></div>
  <div class="sw" style="background: var(--peach-200);"><span class="n">Peach 200</span><span class="v">#FFD9C2</span></div>
  <div class="sw demo">
    <span style="font-family: var(--font-sans); font-size: 12px; font-weight: 600; letter-spacing: 0.06em; color: #FBF4EE;"><span style="font-size: 0.78em; color: #FFD9C2;">01</span> Strategie</span>
    <span style="display: flex; align-items: center; gap: 10px; font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: #FFF3E8;"><span style="display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 6px; background: rgba(255,244,236,0.15); border: 1px solid rgba(255,255,255,0.34); color: #FFD9C2; font-size: 10px;">✓</span>Check auf Terra</span>
  </div>
</body>
</html>
