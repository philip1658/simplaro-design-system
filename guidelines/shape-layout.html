<!-- @dsCard group="Spacing" viewport="700x190" name="Layout-Rhythmus" subtitle="1160px Inhalt · 72–88px Sektionspadding · Hairline-Trenner" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 18px 24px; box-sizing: border-box; }
  .page { border: 1px solid var(--border-strong); border-radius: 12px; overflow: hidden; }
  .sec { position: relative; padding: 16px 40px; }
  .label { position: absolute; right: 10px; top: 8px; font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); }
  .inner { max-width: 74%; margin: 0 auto; border-left: 1px dashed var(--terra-500); border-right: 1px dashed var(--terra-500); padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--text-strong); }
</style>
</head>
<body>
  <div class="page">
    <div class="sec" style="background: var(--cream-100);"><span class="label">#F4EDE1 · pad 72px</span><div class="inner">max-width 1160px, zentriert</div></div>
    <div class="sec" style="background: var(--sand-200); border-top: 1px solid var(--border-strong);"><span class="label">#EAE0CC · alterniert</span><div class="inner">Trenner: 1px-Hairline statt Schatten</div></div>
    <div class="sec" style="background: var(--grad-terra-section);"><span class="label" style="color: rgba(255,243,232,0.7);">Terra-Akzent</span><div class="inner" style="color: #FFF3E8; border-color: rgba(255,243,232,0.5);">Rhythmus: Terra/Dunkel als Statements</div></div>
  </div>
</body>
</html>
