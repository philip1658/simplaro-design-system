<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body style="margin: 0;">
<div id="root"></div>
<script type="text/babel">
const { SpeechBubble, ChatMessage } = window.SimplaroDesignSystem_5f353f;

function Demo() {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.1fr', height: 300 }}>
      <div style={{ background: 'var(--grad-terra-section)', display: 'flex', flexDirection: 'column', gap: 26, alignItems: 'center', justifyContent: 'center', padding: 20 }}>
        <SpeechBubble onClick={() => {}} style={{ maxWidth: 230 }}>
          Grüezi! Haben Sie Fragen?<br />
          <span style={{ color: 'var(--terra-500)' }}>Chatten Sie direkt mit mir →</span>
        </SpeechBubble>
        <SpeechBubble comic tail="right" style={{ maxWidth: 230, fontSize: 14 }}>
          <strong>Büro-Bot</strong> <span style={{ color: 'var(--terra-500)', fontSize: 12.5 }}>fragen Sie mich direkt!</span>
        </SpeechBubble>
      </div>
      <div style={{ background: 'var(--bg-page)', display: 'flex', flexDirection: 'column', gap: 10, justifyContent: 'center', padding: '16px 18px' }}>
        <ChatMessage>Grüezi! Ich beantworte gern Ihre Fragen zu Simplaro, unseren Paketen oder dem Büro-Bot.</ChatMessage>
        <ChatMessage role="user">Was kostet der Büro-Bot?</ChatMessage>
        <ChatMessage comic>Comic-Variante für den Hero-Chat.</ChatMessage>
        <ChatMessage comic role="user">Alles klar!</ChatMessage>
        <span style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--text-muted)' }}>Büro-Bot tippt …</span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
